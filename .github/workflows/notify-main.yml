# rb3dx_assets/.github/workflows/notify-main.yml
name: Notify rb3dx repo

on:
  push:
    branches: [main]

jobs:
  dispatch:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger downstream build
        run: |
          curl -X POST \
            -H "Authorization: Bearer ${{ secrets.RB3DX_ASSETS_PAT }}" \
            -H "Accept: application/vnd.github.v3+json" \
            https://api.github.com/repos/LinosM/rock-band-3-deluxe/actions/workflows/build.yml/dispatches \
            -d '{"ref":"char_pull"}'