name: Notify rb3dx repo

on:
  push:
    branches: [main]

jobs:
  dispatch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main repo
        uses: actions/checkout@v4
        with:
          repository: LinosM/rock-band-3-deluxe
          token: ${{ secrets.RB3DX_ASSETS_PAT }}
          ref: char_pull
          submodules: true

      - name: Update submodule pointer
        run: |
          git submodule update --remote rb3dx_assets
          git config user.name "${{ github.actor }}"
          git config user.email "${{ github.actor_id }}+${{ github.actor }}@users.noreply.github.com"
          git add rb3dx_assets
          git commit -m "rb3dx_assets: ${{ github.event.head_commit.message }}"
          git push